services:
  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: osso
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  blockchain:
    build: ./blockchain
    ports:
      - "8545:8545"
    volumes:
      - blockchain_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--post-data", "{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}", "--header", "Content-Type: application/json", "http://localhost:8545"]
      interval: 5s
      timeout: 5s
      retries: 30

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mysql+pymysql://root:root@db/osso
      SECRET_KEY: osso-nl-docker-2026-xK9mP2qL
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      WEB3_PROVIDER_URL: http://blockchain:8545
      OSSO_REGISTRY_ADDRESS: "0x5FbDB2315678afecb367f032d93F642f64180aa3"
      BACKEND_WALLET_PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
      BACKEND_WALLET_ADDRESS: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
      IDIN_MOCK: "true"
      FRONTEND_URL: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
      blockchain:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  blockchain_data:
