name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:

  # ── 7 · Docker Hub — push naar registry ───────────────────────────────────
  #
  # Vereiste GitHub Secrets:
  #   DOCKERHUB_USERNAME  →  jouw Docker Hub gebruikersnaam
  #   DOCKERHUB_TOKEN     →  Docker Hub access token (hub.docker.com → Account settings → Security)
  #
  docker-hub:
    name: "7 · Docker Hub"
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - service: backend
            context: ./backend
            image: osso-backend
          - service: frontend
            context: ./frontend
            image: osso-frontend
          - service: blockchain
            context: ./blockchain
            image: osso-blockchain

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short
            type=ref,event=branch

      - name: Build en push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

  # ── Deploy naar server (optioneel) ────────────────────────────────────────
  #
  # Vereiste GitHub Secrets:  DEPLOY_HOST, DEPLOY_USER, DEPLOY_KEY
  # Vereiste GitHub Variable: DEPLOY_HOST (om de stap te activeren)
  #
  deploy:
    name: Deploy naar server
    runs-on: ubuntu-latest
    needs: docker-hub
    environment: production
    if: ${{ vars.DEPLOY_HOST != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/osso
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
            echo "Deployment voltooid op $(date)"
