name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1: Backend — Python lint + type check
  # ────────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend (Python 3.13)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Lint with Ruff
        working-directory: backend
        run: ruff check . --output-format=github

      - name: Format check with Ruff
        working-directory: backend
        run: ruff format . --check

      - name: Type check with mypy
        working-directory: backend
        run: |
          mypy . \
            --ignore-missing-imports \
            --exclude '.venv' \
            --exclude 'alembic'

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2: Frontend — TypeScript + ESLint + build
  # ────────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: ESLint
        working-directory: frontend
        run: npm run lint

      - name: Production build
        working-directory: frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3: Blockchain — Solidity compile + Hardhat tests
  # ────────────────────────────────────────────────────────────────────────────
  blockchain:
    name: Blockchain (Hardhat)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: blockchain/package-lock.json

      - name: Install dependencies
        working-directory: blockchain
        run: npm ci

      - name: Compile Solidity contracts
        working-directory: blockchain
        run: npm run compile

      - name: Run Hardhat tests
        working-directory: blockchain
        run: npm test

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 4: Docker — Bouw alle images ter verificatie (geen push)
  # ────────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [backend, frontend, blockchain]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: osso-backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: osso-frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      - name: Build blockchain image
        uses: docker/build-push-action@v6
        with:
          context: ./blockchain
          push: false
          tags: osso-blockchain:ci
          cache-from: type=gha,scope=blockchain
          cache-to: type=gha,scope=blockchain,mode=max
