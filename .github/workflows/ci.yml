name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── 1 · Backend — lint + type check ────────────────────────────────────────
  backend:
    name: "1 · Backend"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff mypy

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check . --output-format=github

      - name: Format check (ruff)
        working-directory: backend
        run: ruff format . --check

      - name: Type check (mypy)
        working-directory: backend
        run: |
          mypy . \
            --ignore-missing-imports \
            --exclude '.venv' \
            --exclude 'alembic'

  # ── 2 · Frontend — type check + lint + build ───────────────────────────────
  frontend:
    name: "2 · Frontend"
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: ESLint
        working-directory: frontend
        run: npm run lint

      - name: Production build
        working-directory: frontend
        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ── 3 · Blockchain — compile + Hardhat tests ───────────────────────────────
  blockchain:
    name: "3 · Blockchain"
    runs-on: ubuntu-latest
    needs: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: blockchain/package-lock.json

      - name: Install dependencies
        working-directory: blockchain
        run: npm ci

      - name: Compile Solidity
        working-directory: blockchain
        run: npm run compile

      - name: Hardhat tests
        working-directory: blockchain
        run: npm test

  # ── 4 · Unit tests — Python pytest ────────────────────────────────────────
  unit-tests:
    name: "4 · Unit tests"
    runs-on: ubuntu-latest
    needs: blockchain

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest pytest-asyncio

      - name: Run unit tests
        working-directory: backend
        run: pytest tests/ -v --tb=short

  # ── 5 · Docker Compose — validatie ────────────────────────────────────────
  docker-compose:
    name: "5 · Docker Compose"
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Valideer docker-compose.yml
        run: docker compose config --quiet

  # ── 6 · Docker build — bouw alle images (geen push) ───────────────────────
  docker-build:
    name: "6 · Docker build"
    runs-on: ubuntu-latest
    needs: docker-compose

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: osso-backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: osso-frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      - name: Build blockchain
        uses: docker/build-push-action@v6
        with:
          context: ./blockchain
          push: false
          tags: osso-blockchain:ci
          cache-from: type=gha,scope=blockchain
          cache-to: type=gha,scope=blockchain,mode=max
